<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ML-Based Flash Flood Forecast for Mesoscale Convective Systems</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>ML-Based Flash Flood Forecast for Mesoscale Convective Systems</h1>

    <section class="card">
      <h2>Status</h2>
      <p id="status">Website deployed. No ML output has been published yet.</p>
    </section>

    <section class="card" id="plot-card" style="display:none;">
      <h2>Latest ML / WPC Plot</h2>
      <img id="latest-plot" alt="Latest realtime ML probability plot">
    </section>

    <section class="card">
      <h2>Archived Forecasts</h2>
      <p id="archive-status">Loading archived forecasts...</p>
      <div class="table-wrap" id="archive-table-wrap" hidden>
        <table>
          <thead>
            <tr>
              <th scope="col">Date</th>
              <th scope="col">Valid Period</th>
              <th scope="col">Files</th>
            </tr>
          </thead>
          <tbody id="archive-rows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    async function loadStatus() {
      try {
        const response = await fetch("latest/status.json?cache=" + Date.now());
        if (!response.ok) return;

        const status = await response.json();
        if (!status.published) return;

        const parts = [];
        if (status.valid_period_label) parts.push("Valid " + status.valid_period_label);
        if (status.site_updated_utc) parts.push("Updated: " + status.site_updated_utc);

        document.getElementById("status").textContent = parts.join(" | ");
        document.getElementById("latest-plot").src = "latest/latest.png?cache=" + Date.now();
        document.getElementById("plot-card").style.display = "block";
      } catch (err) {
        // Keep placeholder text.
      }
    }

    async function loadArchive() {
      const archiveStatus = document.getElementById("archive-status");

      try {
        const response = await fetch("archive/index.json?cache=" + Date.now());
        if (!response.ok) throw new Error("Archive index unavailable");

        const archive = await response.json();
        const entries = Array.isArray(archive) ? archive : archive.entries;
        if (!Array.isArray(entries) || entries.length === 0) {
          archiveStatus.textContent = "No archived forecasts are available yet.";
          return;
        }

        const rows = document.getElementById("archive-rows");
        entries.forEach((entry) => {
          const row = document.createElement("tr");
          const date = document.createElement("td");
          const validPeriod = document.createElement("td");
          const files = document.createElement("td");
          const plotLink = document.createElement("a");
          const statusLink = document.createElement("a");

          date.textContent = entry.date || "—";
          validPeriod.textContent = entry.valid_period_label || "—";
          plotLink.href = entry.plot_url || entry.plot_href;
          plotLink.textContent = "Forecast graphic";
          statusLink.href = entry.status_url || entry.status_href;
          statusLink.textContent = "Forecast metadata";

          files.append(plotLink, document.createTextNode(" | "), statusLink);
          row.append(date, validPeriod, files);
          rows.appendChild(row);
        });

        archiveStatus.hidden = true;
        document.getElementById("archive-table-wrap").hidden = false;
      } catch (err) {
        archiveStatus.textContent = "Archived forecasts are temporarily unavailable.";
      }
    }

    loadStatus();
    loadArchive();
  </script>
</body>
</html>
